name: CI MS6 DevSecOps

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'project/**'
      - '.github/workflows/ci_ms6.yml'

  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - develop
    paths:
      - 'project/**'

jobs:
  devsecops:
    name: Flake8 - Tests - SonarCloud - Snyk
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: project

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: |
          pip install poetry==2.3.2

      - name: Install dependencies
        run: |
          poetry install --no-interaction --with dev

      # TEST + COVERAGE
      - name: Run tests with coverage
        env:
          PYTHONPATH: src
        run: |
          mkdir -p reports
          poetry run pytest -v \
            --cov=src \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=term \
            --junitxml=reports/tests.xml

      - name: Debug coverage
        run: |
          echo "===== COVERAGE CONTENT ====="
          head -40 reports/coverage.xml
         
      # FLAKE8
      - name: Flake8 scan
        run: |
          poetry run flake8 . --statistics | tee reports/flake8.txt

      # SNYK
      - name: Snyk scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          npm install -g snyk
          snyk auth $SNYK_TOKEN
          snyk test --file=poetry.lock > reports/snyk.txt || true

      # SONARCLOUD
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: project

      # ARTIFACTS
      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: devsecops-reports
          path: project/reports/