name: CI MS6

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'project/**'
      - '.github/workflows/ci_ms6.yml'
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - develop
    paths:
      - 'project/**'

jobs:
  flake8:
    name: Flake8
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install poetry==2.3.2
          poetry install --no-interaction

      - name: Run flake8
        run: |
          pip install flake8
          # On lance flake8 sur le répertoire courant (project/)
          poetry run flake8 . --max-line-length=120 --extend-ignore=W292,W391

  sonarqube:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: flake8
    defaults:
      run:
        working-directory: project

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install poetry==2.3.2
          poetry install --no-interaction

      - name: Run tests with coverage
        env:
          PYTHONPATH: src
        run: |
          mkdir -p reports
          # Génère le coverage.xml dans project/reports/
          poetry run pytest --cov=src --cov-report=xml:reports/coverage.xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          # Très important : pointe vers le dossier qui contient sonar-project.properties
          projectBaseDir: project