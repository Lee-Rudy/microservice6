services:
  ms6:
    build: .
    ports:
      - "8001:8001"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/db_ms6


  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: db_ms6
    ports:
      - "5432:5432"
    volumes:
      - ./project/database/db_ms6.sql:/docker-entrypoint-initdb.d/00_db_ms6.sql:ro